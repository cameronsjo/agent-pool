name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Test with coverage
        run: |
          go test -coverprofile=coverage.out -covermode=atomic -coverpkg=./... ./...
          go tool cover -func=coverage.out

      - name: Coverage gate
        env:
          COVERAGE_THRESHOLD: "65"
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep ^total: | awk '{print $NF}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%  (threshold: ${COVERAGE_THRESHOLD}%)"
          awk "BEGIN {exit ($COVERAGE < $COVERAGE_THRESHOLD)}"

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -ldflags="-s -w" -o bin/agent-pool-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/agent-pool
